<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录</title>
    <script src="https://cdn.tailwindcss.com"></script>
        <link rel="stylesheet" href="/static/css/admin_login.css">
</head>
<body class="min-h-screen flex items-center justify-center p-4" data-admin-login-api="/api/admin/login">
    <div class="w-full max-w-md bg-white/95 backdrop-blur rounded-2xl border border-slate-200/70 shadow-xl p-8">
        <div class="flex items-center justify-between mb-2">
            <h1 class="text-2xl font-black text-slate-800">管理员登录</h1>
            <button id="theme-toggle" title="切换夜间模式" aria-label="切换夜间模式" class="mini-icon-link">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 1 0 9.8 9.8Z"></path>
                </svg>
                <span class="sr-only">切换夜间模式</span>
            </button>
        </div>
        <p class="text-slate-500 text-sm mb-6">请输入账号密码后进入题库管理后台</p>

        <form id="login-form" class="space-y-4">
            <label class="block text-sm">
                <span class="text-slate-500">账号</span>
                <input id="username" class="w-full mt-1 px-3 py-2 rounded-lg border" required autocomplete="username">
            </label>
            <label class="block text-sm">
                <span class="text-slate-500">密码</span>
                <input id="password" type="password" class="w-full mt-1 px-3 py-2 rounded-lg border" required autocomplete="current-password">
            </label>
            <button class="w-full py-2.5 rounded-lg bg-indigo-600 text-white font-semibold hover:bg-indigo-700" type="submit">
                登录
            </button>
        </form>

        <p id="error-text" class="hidden mt-4 text-sm text-rose-600"></p>
        <a href="/" title="返回做题页" aria-label="返回做题页" class="mini-icon-link mt-6">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M10 5 3 12l7 7"></path>
                <path d="M4 12h17"></path>
            </svg>
            <span class="sr-only">返回做题页</span>
        </a>
    </div>

    <script src="/static/js/admin_login.js"></script>
</body>
</html>
